############################################################
# EXAMPLE: inherit from another config and override only the
# properties that are different for this scenario.
#
# Paths are resolved relative to the file that declares them.
############################################################
@include=template.properties

# Scenario-specific overrides
logfile=example_include.log
seed=7

# Scale the network up without copying the full template
bootstrap_nodes=250
bootstrap_blocks=250

# Keep the simulation timing ratios coherent while speeding it up
blocktime_ms=50
node_services_tick_ms=5
gossip_flush_period_ms=5

# Adjust the node mix for this scenario
profile.small.prob=0.5
profile.medium.prob=0.35
profile.hub.prob=0.15
profile.hub.hubness=0.75
